name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 6 * * *'   # daily at 06:15 UTC

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev zlib1g-dev \
            libsqlite3-dev libevent-dev libssl-dev libcjson-dev \
            automake libtool bison flex meson ninja-build

      - name: Cache asn1c
        id: cache-asn1c
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/asn1c
            /usr/local/share/asn1c
          key: asn1c-mouse07410-${{ runner.os }}

      - name: Build and install asn1c
        if: steps.cache-asn1c.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/mouse07410/asn1c.git /tmp/asn1c
          cd /tmp/asn1c
          test -f configure || autoreconf -iv
          ./configure
          make -j$(nproc)
          sudo make install

      - name: Configure
        run: meson setup builddir

      - name: Build
        run: meson compile -C builddir

      - name: PHP lint and static analysis
        run: |
          composer install --working-dir=php --no-interaction --quiet
          meson test -C builddir --suite lint -v

      - name: Unit tests
        run: meson test -C builddir --no-suite integration --no-suite lint -v

      - name: Integration tests
        run: meson test -C builddir --suite integration -v --timeout-multiplier 3
